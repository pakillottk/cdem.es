# Automático: push a cualquier rama excepto master (master usa Turnstile real y no tiene preview Worker).
# Manual: workflow_dispatch; si base_url está vacío, la URL se construye desde el proyecto CF y la rama.
#
# Jobs en paralelo:
#   install  → npm ci + caché de navegadores Playwright
#   wait-cf  → espera al Worker desplegado, resuelve Version Preview URL (inmutable por commit)
#              Fallback si faltan credenciales: alias de rama https://{rama}-cdem-es.{domain}
#   test     → corre Playwright contra la URL resuelta (espera install + wait-cf)
#
# Variable de repositorio (Settings → Variables):
#   CLOUDFLARE_WORKERS_DOMAIN  → dominio workers.dev de la cuenta, ej. «cdemtic.workers.dev»
#                                (si no está definida se usa ese valor por defecto)
# Secrets necesarios:
#   CLOUDFLARE_API_TOKEN       → consultar la API de versiones y esperar al despliegue
#   CLOUDFLARE_ACCOUNT_ID      → ídem
#   PREVIEW_SECRET             → cookie preview-token para endpoints de Astro Actions
name: E2E Tests

on:
  push:
    branches-ignore:
      - master
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL a probar (vacío = se construye desde proyecto CF y rama)'
        required: false
        type: string

jobs:

  # ── 1. Instalar deps y navegadores ────────────────────────────────────────
  install:
    name: Instalar deps y navegadores
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Caché de navegadores Playwright
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar navegadores Playwright
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

  # ── 2. Esperar despliegue Cloudflare y resolver URL ───────────────────────
  wait-cf:
    name: Esperar despliegue Cloudflare
    runs-on: ubuntu-latest
    outputs:
      base_url: ${{ steps.select_url.outputs.base_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Construir URL de alias de rama (fallback)
        id: branch_url
        env:
          INPUT_BASE_URL: ${{ inputs.base_url }}
          CF_WORKERS_DOMAIN: ${{ vars.CLOUDFLARE_WORKERS_DOMAIN }}
        run: |
          if [ -n "${INPUT_BASE_URL:-}" ]; then
            BASE_URL="${INPUT_BASE_URL}"
          else
            # Sanitizar rama igual que deploy-preview.sh: solo [a-z0-9-]
            BRANCH=$(echo "${GITHUB_REF_NAME}" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9]/-/g' \
              | sed 's/-\{2,\}/-/g'    \
              | sed 's/^-\|-$//g')
            DOMAIN="${CF_WORKERS_DOMAIN:-cdemtic.workers.dev}"
            BASE_URL="https://${BRANCH}-cdem-es.${DOMAIN}"
          fi
          echo "url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "URL de alias de rama: ${BASE_URL}"

      - name: Esperar despliegue y obtener Version Preview URL
        id: wait
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_WORKER: cdem-es
          CF_WORKERS_DOMAIN: ${{ vars.CLOUDFLARE_WORKERS_DOMAIN }}
          # head_commit.timestamp en push; created_at en workflow_dispatch
          WORKFLOW_STARTED_AT: ${{ github.event.head_commit.timestamp || github.event.created_at }}
        run: |
          if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ACCOUNT_ID:-}" ]; then
            echo "::warning::Faltan CLOUDFLARE_API_TOKEN o CLOUDFLARE_ACCOUNT_ID — omitiendo espera al despliegue."
            exit 0
          fi
          WORKFLOW_STARTED_AT=$(date -d "${WORKFLOW_STARTED_AT:-}" +%s 2>/dev/null \
            || date -j -f "%Y-%m-%dT%H:%M:%S" "${WORKFLOW_STARTED_AT%%+*}" +%s 2>/dev/null \
            || date -u +%s)
          export WORKFLOW_STARTED_AT
          # El script escribe version_url en $GITHUB_OUTPUT si tiene éxito
          bash .github/scripts/wait-cloudflare-pages-deployment.sh

      - name: Seleccionar URL final
        id: select_url
        run: |
          # Preferir Version Preview URL (inmutable por commit); si no hay, usar alias de rama.
          VERSION_URL="${{ steps.wait.outputs.version_url }}"
          BRANCH_URL="${{ steps.branch_url.outputs.url }}"
          FINAL="${VERSION_URL:-$BRANCH_URL}"
          echo "base_url=${FINAL}" >> "$GITHUB_OUTPUT"
          echo "URL de prueba: ${FINAL}"

  # ── 3. Ejecutar tests E2E ─────────────────────────────────────────────────
  test:
    name: Playwright E2E
    needs: [install, wait-cf]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Restaurar caché de navegadores Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Instala siempre las dependencias de sistema (--with-deps); los binarios
      # de los navegadores se saltan si ya están en caché.
      - run: npx playwright install --with-deps

      - name: Run Playwright
        id: playwright
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ needs.wait-cf.outputs.base_url }}
          E2E_PREVIEW_SECRET: ${{ secrets.PREVIEW_SECRET }}

      - name: Resumen de fallos en Job Summary
        if: failure() && steps.playwright.outcome == 'failure'
        run: |
          echo "## ❌ E2E Tests — fallos detectados" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f playwright-report/index.html ]; then
            echo "El informe completo está disponible en el artefacto **playwright-report**." >> $GITHUB_STEP_SUMMARY
          fi
          if [ -d test-results ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Tests fallidos" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find test-results -name 'test-failed-*.txt' -exec cat {} \; 2>/dev/null \
              || find test-results -name '*.txt' -exec cat {} \; 2>/dev/null \
              || echo "(sin detalle de texto disponible)"
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results
          path: test-results/
