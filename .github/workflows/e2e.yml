# Automático: solo push a develop.
# Manual: workflow_dispatch desde Actions; en ramas que no sean develop, deja base_url vacío
# para build+preview en el runner, o indica la URL del despliegue a probar.
#
# En push a develop, si existen CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID y E2E_DEV_URL,
# se espera a que el Worker de Cloudflare esté desplegado antes de los e2e.
# Secret CLOUDFLARE_WORKER = nombre exacto del script Worker (Workers & Pages → nombre del Worker).
name: E2E Tests

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL a probar (vacío en develop = secret E2E_DEV_URL; vacío en otras ramas = preview en CI)'
        required: false
        type: string

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps

      # secrets no pueden usarse en if:; la lógica va en el shell.
      - name: Aviso si no se puede esperar al Worker de Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        env:
          E2E_DEV_URL: ${{ secrets.E2E_DEV_URL }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "${E2E_DEV_URL:-}" ] && { [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ACCOUNT_ID:-}" ]; }; then
            echo "::warning::Configura los secrets CLOUDFLARE_API_TOKEN y CLOUDFLARE_ACCOUNT_ID para esperar al despliegue del Worker antes de los e2e."
          fi

      - name: Esperar despliegue Worker Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_WORKER: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          WORKFLOW_STARTED_AT: ${{ github.event.head_commit.timestamp }}
          E2E_DEV_URL: ${{ secrets.E2E_DEV_URL }}
        run: |
          if [ -z "${E2E_DEV_URL:-}" ] || [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ACCOUNT_ID:-}" ]; then
            echo "Omitiendo espera a Cloudflare (faltan E2E_DEV_URL o credenciales de Cloudflare)."
            exit 0
          fi
          if [ -z "${CF_WORKER:-}" ]; then
            echo "::warning::Define el secret CLOUDFLARE_PAGES_PROJECT con el nombre exacto del Worker (Workers & Pages → nombre del script)."
            exit 0
          fi
          # Convertir timestamp ISO a epoch para la comparación
          WORKFLOW_STARTED_AT=$(date -d "${WORKFLOW_STARTED_AT}" +%s 2>/dev/null \
            || date -j -f "%Y-%m-%dT%H:%M:%S" "${WORKFLOW_STARTED_AT%%+*}" +%s 2>/dev/null \
            || echo "0")
          export WORKFLOW_STARTED_AT
          bash .github/scripts/wait-cloudflare-pages-deployment.sh

      - name: Run Playwright
        id: playwright
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ inputs.base_url != '' && inputs.base_url || github.ref == 'refs/heads/develop' && secrets.E2E_DEV_URL || '' }}
          E2E_PREVIEW_SECRET: ${{ secrets.PREVIEW_SECRET }}

      - name: Resumen de fallos en Job Summary
        if: failure() && steps.playwright.outcome == 'failure'
        run: |
          echo "## ❌ E2E Tests — fallos detectados" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f playwright-report/index.html ]; then
            echo "El informe completo está disponible en el artefacto **playwright-report**." >> $GITHUB_STEP_SUMMARY
          fi
          if [ -d test-results ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Tests fallidos" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find test-results -name 'test-failed-*.txt' -exec cat {} \; 2>/dev/null \
              || find test-results -name '*.txt' -exec cat {} \; 2>/dev/null \
              || echo "(sin detalle de texto disponible)"
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results
          path: test-results/
